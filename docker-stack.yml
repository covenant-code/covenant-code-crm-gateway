# Combined Docker Swarm stack: gateway + crm-service + postgres in ONE stack.
# Within the same stack, gateway reaches crm-service by short name "crm-service:8080" — no underscore, no Java 21 URI issue.
#
# Prerequisites:
#   docker secret create db_password  - (echo "value" | docker secret create db_password -)
#   docker secret create jwt_secret   - (echo "value" | docker secret create jwt_secret -)
#
# Deploy:
#   export $(cat .env | xargs) && docker stack deploy -c docker-stack.yml cccrm --with-registry-auth

services:

  # ── API Gateway ─────────────────────────────────────────────────────────────
  crm-gateway:
    image: ${REGISTRY}/crm-gateway:${GATEWAY_IMAGE_TAG:-latest}
    ports:
      - "80:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8080"
      CRM_SERVICE_URL: http://crm-service:8080
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
    networks:
      - crm-network
    depends_on:
      - crm-service
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── CRM Business Service ─────────────────────────────────────────────────────
  crm-service:
    image: ${REGISTRY}/crm-service:${CRM_IMAGE_TAG:-latest}
    # Port NOT exposed to host — accessible only through gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      SERVER_PORT: "8080"
    secrets:
      - db_password
      - jwt_secret
    networks:
      - crm-network
    depends_on:
      - postgres
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 120s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - db_password
    networks:
      - crm-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  crm-network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
